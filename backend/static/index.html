<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Tech-IT · Wissensdatenbank</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css?v=20260622-7">
  <script src="theme.js?v=20260622-6"></script>
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <img src="logo.png" alt="Tech-IT Consulting" class="logo">
      <span class="brand-text">Wissensdatenbank</span>
    </div>
    <div class="topbar-right">
      <button id="newchat" type="button" class="newchat" title="Neuer Chat in neuem Tab">&#10010; Neuer Chat</button>
      <div class="engine-box">
        <label for="engine">Engine</label>
        <select id="engine"></select>
      </div>
      <a class="gear" href="settings.html" title="Einstellungen" aria-label="Einstellungen">&#9881;</a>
    </div>
  </header>

  <nav class="chattabs" id="chattabs"></nav>

  <main id="chat" class="chat">
    <div class="welcome">
      <h1>Frag deine Dokumente</h1>
      <p>Stelle eine Frage zu deinen internen Unterlagen. Die Antwort wird ausschliesslich aus den hinterlegten Quellen erzeugt &ndash; und bleibt lokal.</p>
      <div class="examples">
        <button class="chip" data-q="Wie oft werden die Server gesichert und wie lange werden Backups aufbewahrt?">Backup-Intervall?</button>
        <button class="chip" data-q="Welche Schritte gibt es beim Onboarding eines neuen Kunden?">Kunden-Onboarding?</button>
        <button class="chip" data-q="Wie werden Angebote erstellt?">Angebotserstellung?</button>
      </div>
    </div>
  </main>

  <form id="composer" class="composer">
    <input id="q" type="text" placeholder="Frage zu deinen Dokumenten&hellip;" autocomplete="off" required>
    <button id="mic" type="button" class="mic" aria-label="Spracheingabe" title="Spracheingabe">&#127908;</button>
    <button id="send" type="submit" aria-label="Senden">Senden</button>
  </form>

  <footer class="footer">
    &copy; <span id="year"></span> Tech-IT Consulting &middot; Interne Wissensdatenbank &middot; Daten bleiben lokal &middot; <span class="appver"></span>
  </footer>

  <script src="branding.js?v=20260623-2"></script>
  <script src="guard.js"></script>
  <script src="app.js?v=20260622-7"></script>
</body>
</html>
